[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA: all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 404: only when the asset truly doesn't exist
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
